<VirtualHost *:80>
    ServerName blog-app.com
    ServerAlias www.blog-app.com localhost
    DocumentRoot /usr/local/apache2/htdocs
    
    <Directory "/usr/local/apache2/htdocs">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    ProxyPassMatch ^/(.*\.php)$ fcgi://php-fpm:9000/var/www/html/public/$1
          
    DirectoryIndex index.php index.html
    
    ErrorLog logs/blog-app-error.log
    CustomLog logs/blog-app-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName blog-app.com
    ServerAlias www.blog-app.com localhost  
    DocumentRoot /usr/local/apache2/htdocs
    
    <Directory "/usr/local/apache2/htdocs">
        AllowOverride All
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>

    # Enable SSL Engine and point to certificate files
    SSLEngine on
    SSLCertificateFile "/usr/local/apache2/conf/certs/apache-selfsigned.crt"
    SSLCertificateKeyFile "/usr/local/apache2/conf/certs/apache-selfsigned.key"

    ProxyPassMatch ^/(.*\.php)$ fcgi://php-fpm:9000/var/www/html/public/$1
    
    DirectoryIndex index.php index.html
    
    ErrorLog logs/blog-app-error.log
    CustomLog logs/blog-app-access.log combined
</VirtualHost>
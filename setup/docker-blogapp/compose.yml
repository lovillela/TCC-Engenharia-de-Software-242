services:

  apache:
    build:
      context: ./apache
      dockerfile: Dockerfile
    container_name: apache-httpd
    networks:
      - web
    ports:
      - 80:80
      - 443:443
    volumes:
      - ../../public/:/usr/local/apache2/htdocs

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: php-fpm
    networks:
      - database
      - web
    volumes:
      - ../../:/var/www/html

  mysql:
    container_name: mysql-db
    image: mysql:8.4
    networks:
      - database
    volumes:
      - ${HOME}/database:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: blog_app      # Create initial database
      MYSQL_USER: blogApp         # Create application user
      MYSQL_PASSWORD: b667IeRK2c9M4zQ8P2c9TnUN8zACLw7R     # Application user password

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin:latest
    networks:
      - database
    ports:
      - 8090:80
    environment:
      PMA_HOST: mysql-db  # Tell phpMyAdmin where MySQL is
      PMA_PORT: 3306

networks:
    database:
      driver: bridge
      name: blogapp_database
    web:
      driver: bridge
      name: blogapp_web